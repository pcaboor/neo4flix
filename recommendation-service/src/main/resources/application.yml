server:
  port: 8084

spring:
  application:
    name: recommendation-service
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: ${NEO4J_PASSWORD:neo4flix123}
  data:
    neo4j:
      database: neo4j

management:
  endpoints:
    web:
      exposure:
        include: health, info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

neo4flix:
  security:
    jwt:
      secret: ${NEO4FLIX_JWT_SECRET:change-me-please-this-is-not-a-prod-secret-32chars}
      access-token-ttl: PT1H
      refresh-token-ttl: P30D
      issuer: neo4flix
