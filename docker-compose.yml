services:
  neo4j:
    image: neo4j:5.20-community
    container_name: neo4flix-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP — interface web Neo4j Browser
      - "7687:7687"   # Bolt — protocole utilisé par les drivers (Spring Boot)
    environment:
      NEO4J_AUTH: neo4j/neo4flix123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/init:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
