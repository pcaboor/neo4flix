# ============================================================
# Configuration nginx pour le mode HTTPS local.
# - :80 redirige vers :443
# - /health reste servi en HTTP pour le healthcheck Docker
# - /api/* reste reverse-proxy vers le gateway
# ============================================================

server {
    listen       80;
    server_name  _;

    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen       443 ssl;
    http2        on;
    server_name  _;

    root         /usr/share/nginx/html;
    index        index.html;

    ssl_certificate     /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Compression
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css text/xml application/javascript
                      application/json application/xml application/xml+rss
                      image/svg+xml;

    # Cache long sur les assets hashés (Angular génère des noms uniques par build).
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # /api/* → proxy vers le gateway-service.
    location /api/ {
        proxy_pass         http://gateway-service:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health check HTTPS si besoin d'un check manuel.
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback : toute route non matchée renvoie index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
