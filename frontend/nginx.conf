# ============================================================
# Configuration nginx pour servir le bundle Angular et faire
# du reverse-proxy vers l'API Gateway.
# ============================================================

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Compression
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css text/xml application/javascript
                      application/json application/xml application/xml+rss
                      image/svg+xml;

    # Cache long sur les assets hashés (Angular génère des noms uniques par build).
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # /api/* → proxy vers le gateway-service.
    # Le gateway tourne dans le même réseau Docker, accessible par hostname.
    location /api/ {
        proxy_pass         http://gateway-service:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Augmente le timeout si une reco est longue
        proxy_read_timeout 60s;
    }

    # Health check du conteneur (utilisé par Docker HEALTHCHECK).
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback : toute route non matchée renvoie index.html
    # → Angular Router prend le relais côté client.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
